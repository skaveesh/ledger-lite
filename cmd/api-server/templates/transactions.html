{{ define "content" }}
<h2>Transactions</h2>
<table border="1" cellpadding="6" cellspacing="0">
  <thead>
    <tr>
      <th>ID</th>
      <th>Category</th>
      <th>Amount (cents)</th>
      <th>Description</th>
      <th>Date</th>
    </tr>
  </thead>
  <tbody>
    {{ range .Transactions }}
    <tr>
      <td>{{ .ID }}</td>
      <td>{{ .CategoryID }}</td>
      <td>{{ .AmountCents }}</td>
      <td>{{ .Description }}</td>
      <td>{{ .Date.Format "2006-01-02" }}</td>
    </tr>
    {{ else }}
    <tr>
      <td colspan="5">No transactions yet.</td>
    </tr>
    {{ end }}
  </tbody>
</table>
{{ end }}
