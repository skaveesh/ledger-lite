{{ define "content" }}
<h2>Transactions</h2>

<h3>Add Transaction</h3>
<form method="post" action="/ui/transactions/add">
  <label>Category ID: <input type="number" name="category_id" min="1" required></label><br>
  <label>Amount (cents): <input type="number" name="amount_cents" required></label><br>
  <label>Description: <input type="text" name="description"></label><br>
  <label>Date: <input type="date" name="date" required></label><br>
  <button type="submit">Add Transaction</button>
</form>

<table border="1" cellpadding="6" cellspacing="0">
  <thead>
    <tr>
      <th>ID</th>
      <th>Category</th>
      <th>Amount (cents)</th>
      <th>Description</th>
      <th>Date</th>
    </tr>
  </thead>
  <tbody>
    {{ range .Transactions }}
    <tr>
      <td>{{ .ID }}</td>
      <td>{{ .CategoryID }}</td>
      <td>{{ .AmountCents }}</td>
      <td>{{ .Description }}</td>
      <td>{{ .Date.Format "2006-01-02" }}</td>
    </tr>
    {{ else }}
    <tr>
      <td colspan="5">No transactions yet.</td>
    </tr>
    {{ end }}
  </tbody>
</table>
{{ end }}
