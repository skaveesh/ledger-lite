{{ define "content" }}
<h2>Categories</h2>
<table border="1" cellpadding="6" cellspacing="0">
  <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
    </tr>
  </thead>
  <tbody>
    {{ range .Categories }}
    <tr>
      <td>{{ .ID }}</td>
      <td>{{ .Name }}</td>
    </tr>
    {{ else }}
    <tr>
      <td colspan="2">No categories yet.</td>
    </tr>
    {{ end }}
  </tbody>
</table>
{{ end }}
