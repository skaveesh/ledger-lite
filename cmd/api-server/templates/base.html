{{ define "base" }}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }}</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem auto; max-width: 980px; line-height: 1.4; }
    nav a { margin-right: 0.75rem; text-decoration: none; color: #184a8b; }
    nav a:hover { text-decoration: underline; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th, td { border: 1px solid #d8d8d8; padding: 0.5rem; text-align: left; }
    th { background: #f5f7fb; }
    form { margin: 0.75rem 0; }
    input, select, button { padding: 0.35rem; margin-right: 0.4rem; }
  </style>
</head>
<body>
  <header>
    <h1>LedgerLite UI</h1>
    <nav>
      <a href="/ui">Home</a>
      <a href="/ui/transactions">Transactions</a>
      <a href="/ui/categories">Categories</a>
      <a href="/ui/budgets">Budgets</a>
      <a href="/ui/summary">Summary</a>
    </nav>
    <hr>
  </header>
  <main>
    {{ template "content" . }}
  </main>
</body>
</html>
{{ end }}
